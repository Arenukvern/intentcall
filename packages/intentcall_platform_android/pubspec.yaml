name: intentcall_platform_android
description: PRE-RELEASE — Android federated implementation for intentcall_platform.
version: 0.6.0
license: MIT
repository: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform_android
issue_tracker: https://github.com/Arenukvern/intentcall/issues
homepage: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform_android
topics:
  - mcp
  - flutter
  - android

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.24.0"
resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  intentcall_bridge: ^0.6.0

flutter:
  plugin:
    implements: intentcall_platform
    platforms:
      android:
        package: dev.intentcall.intentcall_platform
        pluginClass: IntentCallPlatformPlugin

dev_dependencies:
  lints: ^6.1.0
  xsoulspace_lints: ^0.1.2
