name: intentcall_platform
description: PRE-RELEASE — Platform emitters and sync for intentcall (web
  manifest, WebMCP JS, bootstrap).
version: 0.3.0
license: MIT
repository: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform
issue_tracker: https://github.com/Arenukvern/intentcall/issues
homepage: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform
topics:
  - mcp
  - flutter
  - agents

environment:
  sdk: ">=3.11.0 <4.0.0"
  flutter: ">=3.24.0"
resolution: workspace

dependencies:
  app_links: ^6.4.0
  flutter:
    sdk: flutter
  intentcall_core: ^0.2.1
  intentcall_schema: ^0.2.1
  meta: ^1.17.0
  path: ^1.9.1
  web: ^1.1.1

flutter:
  plugin:
    platforms:
      android:
        package: dev.intentcall.intentcall_platform
        pluginClass: IntentCallPlatformPlugin
      ios:
        pluginClass: IntentCallPlatformPlugin
      macos:
        pluginClass: IntentCallPlatformPlugin

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
  xsoulspace_lints: ^0.1.2
