name: intentcall_platform
description: >-
  PRE-RELEASE — Federated Flutter runtime umbrella for IntentCall: Dart host
  APIs, WebMCP bootstrap, and endorsed native platform implementations.
version: 0.6.0
license: MIT
repository: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform
issue_tracker: https://github.com/Arenukvern/intentcall/issues
homepage: https://github.com/Arenukvern/intentcall/tree/main/packages/intentcall_platform
topics:
  - mcp
  - flutter
  - agents

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.24.0"
resolution: workspace

dependencies:
  app_links: ^6.4.0
  flutter:
    sdk: flutter
  intentcall_bridge: ^0.6.0
  intentcall_core: ^0.6.0
  intentcall_platform_android: ^0.6.0
  intentcall_platform_apple: ^0.6.0
  intentcall_platform_sync: ^0.6.0
  intentcall_schema: ^0.6.0
  meta: ^1.18.0
  path: ^1.9.1
  web: ^1.1.1

flutter:
  plugin:
    platforms:
      android:
        default_package: intentcall_platform_android
      ios:
        default_package: intentcall_platform_apple
      macos:
        default_package: intentcall_platform_apple

dev_dependencies:
  lints: ^6.1.0
  test: ^1.31.1
  xsoulspace_lints: ^0.1.2
