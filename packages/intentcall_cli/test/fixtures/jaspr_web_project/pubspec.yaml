name: jaspr_web_project_fixture
description: CLI test fixture with generated catalog.
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  intentcall_codegen:
    path: ../../../../intentcall_codegen
  intentcall_core:
    path: ../../../../intentcall_core
  intentcall_platform_sync:
    path: ../../../../intentcall_platform_sync
  intentcall_schema:
    path: ../../../../intentcall_schema

dev_dependencies:
  build_runner: ^2.15.0
  intentcall_hooks:
    path: ../../../../intentcall_hooks

hooks:
  user_defines:
    intentcall_hooks:
      project_root: .
      platforms: web
      check_only: false

dependency_overrides:
  intentcall_schema:
    path: ../../../../intentcall_schema
  intentcall_core:
    path: ../../../../intentcall_core
  intentcall_platform_sync:
    path: ../../../../intentcall_platform_sync
  intentcall_hooks:
    path: ../../../../intentcall_hooks
