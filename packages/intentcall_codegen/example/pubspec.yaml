name: intentcall_codegen_example
description: Runnable dogfood host for intentcall_codegen.
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  intentcall_codegen:
    path: ..
  intentcall_core:
    path: ../../intentcall_core
  intentcall_platform_sync:
    path: ../../intentcall_platform_sync
  intentcall_schema:
    path: ../../intentcall_schema

dev_dependencies:
  build_runner: ^2.15.0
  flutter:
    sdk: flutter
  intentcall_platform:
    path: ../../intentcall_platform
  lints: ^6.1.0
  path: ^1.9.1
  test: ^1.31.1
  xsoulspace_lints: ^0.1.2

dependency_overrides:
  intentcall_schema:
    path: ../../intentcall_schema
  intentcall_core:
    path: ../../intentcall_core
  intentcall_platform_sync:
    path: ../../intentcall_platform_sync
  intentcall_platform:
    path: ../../intentcall_platform
