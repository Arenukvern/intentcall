name: IntentCall CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 3'

jobs:
  test-analyze-publish-dry-run:
    name: test · analyze · publish dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 9.15.4

      - name: pnpm install (docs.page CLI)
        run: pnpm install --frozen-lockfile

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          cache: true

      - name: release train metadata check
        run: dart tool/intentcall/bin/release_train.dart check

      - name: dart pub get
        run: dart pub get

      - name: test
        run: just test

      - name: ADR 0019 validation gates
        run: just adr-gates

      - name: projection pipeline check
        run: just projection-pipeline-check

      - name: analyze
        run: dart analyze .

      - name: validate workspace
        run: dart run tool/intentcall/bin/intentcall.dart validate

      - name: pub.dev dry-run (all packages)
        run: dart run tool/intentcall/bin/intentcall.dart publish-all

      - name: docs.page check
        run: pnpm run docs:check
