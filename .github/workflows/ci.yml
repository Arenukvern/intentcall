name: IntentCall CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 3'

jobs:
  test-analyze-publish-dry-run:
    name: test · analyze · publish dry-run
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: dart pub get
        run: dart pub get

      - name: test
        run: dart test packages/intentcall_schema packages/intentcall_core packages/intentcall_session packages/intentcall_mcp packages/intentcall_webmcp packages/intentcall_gemma packages/intentcall_apple packages/intentcall_android packages/intentcall_platform packages/intentcall_codegen packages/intentcall_testing tool/intentcall

      - name: analyze
        run: dart analyze .

      - name: validate workspace
        run: dart run tool/intentcall/bin/intentcall.dart validate

      - name: pub.dev dry-run (all packages)
        run: dart run tool/intentcall/bin/intentcall.dart publish-all
