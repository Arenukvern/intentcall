schema: steward/v1
repo:
  id: intentcall
  archetype: library
harness:
  name: intentcall
  mode: cli
  description: IntentCall workspace validation and release-preflight control plane.
  entrypoints:
    cli: dart run tool/intentcall/bin/intentcall.dart
adoption:
  status: adopting
  owner: intentcall
  gate:
    pillar: quality
stewardship:
  governance:
    charter: AGENTS.md
    adr_dir: docs/decisions/
    ethics_charter: docs/NORTH_STAR.mdx
  knowledge:
    docs_map: AGENTS.md
    source_policy: required_for_external_claims
  repo_quality:
    contract_spec: steward.yaml
    maturity_model: general_stewardship
    evidence: .steward/benchmark-summaries
  skill_lifecycle:
    installable_skills: true
    registry: skills.sh.json
  quality:
    validate: dart run tool/intentcall/bin/intentcall.dart validate
    skill_eval: steward eval
  harness:
    enabled: true
    action_contract: actions
  release:
    changelog: release-please-config.json
    artifact_provenance: required
  review_handoff:
    moe_required_for_architecture: true
  strategic_alignment:
    vision_source: docs/NORTH_STAR.mdx
    success_evidence: required
  security:
    action_effects: required
    redaction: steward/redaction/v1
  org:
    owners: AGENTS.md
validators:
  - type: disallowed-substrings
    files:
      - "**/pubspec.yaml"
    exclude:
      - "**/.dart_tool/**"
      - "**/build/**"
    substrings:
      - "intentcall/packages"
    message: "FAIL: Sibling path overrides are not allowed in published packages."
actions:
  intentcall.validate:
    kind: command
    desc: Validate path dependencies, version consistency, docs version drift, and active-plan hygiene.
    command:
      argv: [dart, run, tool/intentcall/bin/intentcall.dart, validate]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/intentcall/**
        - packages/**
        - skills/**
        - docs/**
        - README.md
        - PRE_RELEASE.md
        - AGENTS.md
        - pubspec.yaml
        - pubspec.lock
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.adapter-contract-test:
    kind: command
    desc: Run native adapter and platform bridge contract tests.
    command:
      argv: [just, adapter-contract-test]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_testing/**
        - packages/intentcall_mcp/**
        - packages/intentcall_webmcp/**
        - packages/intentcall_gemma/**
        - packages/intentcall_platform_sync/**
        - packages/intentcall_cli/**
        - packages/intentcall_platform/**
        - pubspec.yaml
        - pubspec.lock
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.manifest-export-check:
    kind: command
    desc: Verify committed agent_manifest.json matches merge(catalog, projection) after build_runner.
    command:
      argv: [just, manifest-export-check]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_codegen/**
        - packages/intentcall_cli/**
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 400000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.manifest-parity:
    kind: command
    desc: Verify manifest fixture rows are present in a matching registry snapshot.
    command:
      argv: [just, manifest-parity]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_cli/**
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.platform-sync-check:
    kind: command
    desc: Verify generated platform artifacts match emitters on fixture projects.
    command:
      argv: [just, platform-sync-check]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_cli/**
        - packages/intentcall_platform_sync/**
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.projection-pipeline-check:
    kind: command
    desc: Run Layer 5 projection pipeline gates (merger, dense export, emitters, codegen example sync).
    command:
      argv: [just, projection-pipeline-check]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_platform_sync/**
        - packages/intentcall_codegen/**
        - packages/intentcall_cli/**
        - pubspec.yaml
        - pubspec.lock
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 500000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.manifest-resource-uri-check:
    kind: command
    desc: Assert manifest export never emits intentcall:// and derived resource URIs use protocolScheme.
    command:
      argv: [just, manifest-resource-uri-check]
      shell: false
    cwd: .
    effects:
      fs_read:
        - justfile
        - packages/intentcall_platform_sync/**
        - packages/intentcall_schema/**
        - packages/intentcall_cli/**
        - packages/intentcall_codegen/**
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.projection-alignment-test:
    kind: command
    desc: Run cross-layer projection alignment matrix test.
    command:
      argv:
        [
          dart,
          test,
          packages/intentcall_platform_sync/test/projection_alignment_test.dart,
        ]
      shell: false
    cwd: .
    effects:
      fs_read:
        - packages/intentcall_platform_sync/**
        - pubspec.yaml
        - pubspec.lock
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
  intentcall.docs-check:
    kind: command
    desc: Validate docs.page config (docs.json) and internal documentation links.
    command:
      argv: [just, docs-check]
      shell: false
    cwd: .
    effects:
      fs_read:
        - docs/**
        - docs.json
        - package.json
        - pnpm-lock.yaml
        - justfile
        - node_modules/@docs.page/cli/**
      fs_write:
        - node_modules/**
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 60000
      max_output_bytes: 500000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
probes:
  quick:
    profile: quick
    actions: [intentcall.validate, intentcall.adapter-contract-test, intentcall.manifest-export-check, intentcall.manifest-parity, intentcall.platform-sync-check]
diagnostics:
  cases: {}
unknown_cases:
  path: .steward/unknown-cases
  retention: local
provenance:
  dependencies: []
  artifacts: []
  benchmarks:
    - id: intentcall.adapter-contract
      manifest: steward/scenarios/intentcall.adapter-contract.yaml
    - id: intentcall.projection-pipeline
      manifest: steward/scenarios/intentcall.projection-pipeline.yaml
    - id: intentcall.manifest-resource-uri
      manifest: steward/scenarios/intentcall.manifest-resource-uri.yaml
branding:
  banned_words: [unlock, supercharge, ultimate, leverage]
  ignored_paths: []
governance:
  adr_directory: docs/decisions/
  faq_paths:
    design: docs/DESIGN_FAQ.mdx
    dx: docs/DX_FAQ.mdx
  ethics_charter: docs/NORTH_STAR.mdx
skills_distribution:
  source_dir: skills/
  output: skills.sh.json
