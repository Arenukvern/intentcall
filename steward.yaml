archetype: "B — Platform libs"
validators:
  - type: disallowed-substrings
    files:
      - "**/pubspec.yaml"
    exclude:
      - "**/.dart_tool/**"
      - "**/build/**"
    substrings:
      - "intentcall/packages"
    message: "FAIL: Sibling path overrides are not allowed in published packages."

branding:
  banned_words: ["unlock", "supercharge", "ultimate", "leverage"]
  ignored_paths: []

governance:
  adr_directory: "docs/decisions/"
  faq_paths:
    design: "docs/DESIGN_FAQ.mdx"
    dx: "docs/DX_FAQ.mdx"
  ethics_charter: "docs/NORTH_STAR.mdx"

skills_distribution:
  source_dir: "skills/"
  output: "skills.sh.json"

pipelines:
  test:
    cmd: "dart test packages/intentcall_schema packages/intentcall_core packages/intentcall_mcp packages/intentcall_webmcp packages/intentcall_gemma packages/intentcall_apple packages/intentcall_android packages/intentcall_platform packages/intentcall_codegen packages/intentcall_testing"
    desc: "Run tests for all packages in the workspace"
  analyze:
    cmd: "dart analyze ."
    desc: "Analyze the Dart code in the workspace"
  publish-dry-run:
    cmd: "dart run tool/intentcall/bin/intentcall.dart publish-all"
    desc: "Dry-run publishing all packages in order"
  validate:
    cmd: "dart run tool/intentcall/bin/intentcall.dart validate"
    desc: "Validate path dependencies and version consistency"
