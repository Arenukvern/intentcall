schema: steward/v1
repo:
  id: intentcall
  archetype: platform_libs
harness:
  name: intentcall
  mode: cli
  description: IntentCall workspace validation and release-preflight control plane.
  entrypoints:
    cli: dart run tool/intentcall/bin/intentcall.dart
adoption:
  status: adopting
  owner: intentcall
  gate:
    pillar: quality
stewardship:
  governance:
    charter: AGENTS.md
    adr_dir: docs/decisions/
    ethics_charter: docs/NORTH_STAR.mdx
  knowledge:
    docs_map: AGENTS.md
    source_policy: required_for_external_claims
  skill_lifecycle:
    installable_skills: true
    registry: skills.sh.json
  quality:
    validate: dart run tool/intentcall/bin/intentcall.dart validate
    skill_eval: steward eval
  harness:
    enabled: true
    action_contract: actions
  release:
    changelog: release-please-config.json
    artifact_provenance: required
  review_handoff:
    moe_required_for_architecture: true
  strategic_alignment:
    vision_source: docs/NORTH_STAR.mdx
    success_evidence: required
  security:
    action_effects: required
    redaction: steward/redaction/v1
  org:
    owners: AGENTS.md
validators:
  - type: disallowed-substrings
    files:
      - "**/pubspec.yaml"
    exclude:
      - "**/.dart_tool/**"
      - "**/build/**"
    substrings:
      - "intentcall/packages"
    message: "FAIL: Sibling path overrides are not allowed in published packages."
actions:
  intentcall.validate:
    kind: command
    desc: Validate path dependencies, version consistency, and active-plan hygiene.
    command:
      argv: [dart, run, tool/intentcall/bin/intentcall.dart, validate]
      shell: false
    cwd: .
    effects:
      fs_read:
        - tool/intentcall/**
        - packages/**
        - pubspec.yaml
        - pubspec.lock
      fs_write: []
      git: false
      network: false
      secrets: false
      destructive: false
    safety:
      class: bounded_local
      default_policy: auto
      requires_confirmation: false
    limits:
      timeout_ms: 10000
      max_output_bytes: 200000
    outputs:
      - id: stdout
        kind: stream
        required: true
        retention: summary
        format: text
    evidence:
      redaction: steward/redaction/v1
      summary_fields: [exit_code, duration_ms, output_digest]
probes:
  quick:
    profile: quick
    actions: [intentcall.validate]
diagnostics:
  cases: {}
unknown_cases:
  path: .steward/unknown-cases
  retention: local
provenance:
  dependencies: []
  artifacts: []
  benchmarks:
    - id: intentcall.adapter-contract
      manifest: steward/scenarios/intentcall.adapter-contract.yaml
branding:
  banned_words: [unlock, supercharge, ultimate, leverage]
  ignored_paths: []
governance:
  adr_directory: docs/decisions/
  faq_paths:
    design: docs/DESIGN_FAQ.mdx
    dx: docs/DX_FAQ.mdx
  ethics_charter: docs/NORTH_STAR.mdx
skills_distribution:
  source_dir: skills/
  output: skills.sh.json
